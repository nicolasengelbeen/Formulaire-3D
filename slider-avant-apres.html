<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avant / Après — TonRendu3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f7f4ef;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', Arial, sans-serif;
    padding: 32px 16px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c8622a;
    margin-bottom: 12px;
  }

  h2 {
    font-family: Georgia, serif;
    font-size: clamp(22px, 4vw, 32px);
    color: #1a1612;
    margin-bottom: 8px;
    text-align: center;
  }

  .subtitle {
    font-size: 15px;
    color: #8a8178;
    margin-bottom: 32px;
    text-align: center;
  }

  /* CONTAINER SLIDER */
  .slider-wrap {
    position: relative;
    width: 100%;
    max-width: 860px;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 12px;
    cursor: ew-resize;
    user-select: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  }

  /* IMAGE APRÈS (fond) */
  .img-after {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* IMAGE AVANT (révélée par clip) */
  .img-before-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
    width: 50%; /* contrôlé par JS */
  }

  .img-before-wrap img {
    position: absolute;
    top: 0; left: 0;
    width: var(--full-width, 860px);
    max-width: none;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  /* LIGNE CENTRALE */
  .divider {
    position: absolute;
    top: 0;
    left: 50%; /* contrôlé par JS */
    width: 2px;
    height: 100%;
    background: white;
    transform: translateX(-50%);
    pointer-events: none;
    transition: none;
  }

  /* BOUTON CENTRAL */
  .handle {
    position: absolute;
    top: 50%;
    left: 50%; /* contrôlé par JS */
    transform: translate(-50%, -50%);
    width: 44px;
    height: 44px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .handle svg {
    width: 20px;
    height: 20px;
  }

  /* ÉTIQUETTES */
  .label {
    position: absolute;
    top: 16px;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 5;
  }

  .label-before {
    left: 16px;
    background: rgba(26, 22, 18, 0.65);
    color: white;
  }

  .label-after {
    right: 16px;
    background: rgba(200, 98, 42, 0.85);
    color: white;
  }

  /* HINT MOBILE */
  .hint {
    margin-top: 16px;
    font-size: 12px;
    color: #b0a99e;
    display: flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>



<p class="section-label">La différence en un geste</p>
<h2>Voyez ce que vos visiteurs voient vraiment</h2>
<p class="subtitle">Glissez pour comparer une annonce classique et un plan 3D TonRendu3D</p>

<div class="slider-wrap" id="slider">

  <!-- =============================================
       REMPLACEZ CES DEUX URLs PAR VOS IMAGES
       - img-after  = votre rendu 3D (l'Après)
       - img-before = photo classique de l'annonce (l'Avant)
  ============================================= -->

  <!-- IMAGE APRÈS (rendu 3D) -->
  <img class="img-after" src="https://nicolasengelbeen.github.io/Formulaire-3D/Rendu1.png" alt="Après — Plan 3D TonRendu3D">

  <!-- IMAGE AVANT (photo classique) -->
  <div class="img-before-wrap" id="beforeWrap">
    <img src="https://nicolasengelbeen.github.io/Formulaire-3D/Annoncebasique.jpg" alt="Avant — Photo classique" id="imgBefore">
  </div>

  <!-- LIGNE + POIGNÉE -->
  <div class="divider" id="divider"></div>
  <div class="handle" id="handle">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M7 5L3 10L7 15" stroke="#c8622a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M13 5L17 10L13 15" stroke="#c8622a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- ÉTIQUETTES -->
  <div class="label label-before">Avant</div>
  <div class="label label-after">Après</div>

</div>

<p class="hint">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2L2 7L5 12M9 2L12 7L9 12" stroke="#b0a99e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Glissez le curseur pour comparer
</p>

<script>
  const slider   = document.getElementById('slider');
  const beforeWrap = document.getElementById('beforeWrap');
  const imgBefore  = document.getElementById('imgBefore');
  const divider  = document.getElementById('divider');
  const handle   = document.getElementById('handle');

  let pos = 50; // position en %
  let dragging = false;
  let animDone = false;

  function setPos(pct) {
    pct = Math.max(2, Math.min(98, pct));
    pos = pct;
    beforeWrap.style.width = pct + '%';
    divider.style.left     = pct + '%';
    handle.style.left      = pct + '%';
    // Compense le clip pour que l'image avant reste cadrée correctement
    imgBefore.style.width  = slider.offsetWidth + 'px';
  }

  function getPct(clientX) {
    const rect = slider.getBoundingClientRect();
    return ((clientX - rect.left) / rect.width) * 100;
  }

  // — Mouse —
  slider.addEventListener('mousedown', e => {
    dragging = true;
    animDone = true;
    setPos(getPct(e.clientX));
  });
  window.addEventListener('mousemove', e => {
    if (dragging) setPos(getPct(e.clientX));
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  // — Touch —
  slider.addEventListener('touchstart', e => {
    dragging = true;
    animDone = true;
    setPos(getPct(e.touches[0].clientX));
  }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (dragging) setPos(getPct(e.touches[0].clientX));
  }, { passive: true });
  window.addEventListener('touchend', () => { dragging = false; });

  // — Animation automatique au chargement —
  // Démarre au milieu (50%), glisse vers 85% (révèle l'Après), puis s'arrête
  function autoAnimate() {
    if (animDone) return;
    const target = 85;
    const duration = 1800; // ms
    const start = performance.now();
    const startPos = 50;

    function step(now) {
      if (animDone) return;
      const elapsed = now - start;
      const t = Math.min(elapsed / duration, 1);
      // Easing ease-in-out
      const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      setPos(startPos + (target - startPos) * ease);
      if (t < 1) requestAnimationFrame(step);
    }

    // Petite pause avant de démarrer l'animation
    setTimeout(() => {
      if (!animDone) requestAnimationFrame(step);
    }, 800);
  }

  // Init
  setPos(50);
  autoAnimate();

  // Recalcul si resize
  window.addEventListener('resize', () => setPos(pos));
</script>

</body>
</html>
