<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avant / Après — TonRendu3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    background: #f7f4ef;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    padding: 32px 0;
  }

  .section-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c8622a;
    margin-bottom: 12px;
    text-align: center;
  }

  h2 {
    font-family: Georgia, serif;
    font-size: clamp(22px, 4vw, 32px);
    color: #1a1612;
    margin-bottom: 8px;
    text-align: center;
  }

  .subtitle {
    font-size: 15px;
    color: #8a8178;
    margin-bottom: 32px;
    text-align: center;
    padding: 0 16px;
  }

  .slider-outer {
    position: relative;
    width: 100vw;
    height: 800px;
    background: #f7f4ef;
    padding: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    overflow: hidden;
    cursor: ew-resize;
    user-select: none;
  }

  .panel {
    position: absolute;
    inset: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #panelAvant {
    justify-content: flex-start;
  }

  #panelAvant .photos-row img {
    height: 200px;
    flex: 1;
    width: 0;
    object-fit: cover;
    border-radius: 8px;
  }

  #panelAvant .rendus-row {
    display: flex;
    gap: 12px;
    height: 300px;
  }

  #panelAvant .rendus-row img {
    flex: 1;
    width: 0;
    height: 100%;
    object-fit: contain;
    border-radius: 8px;
    background: #f7f4ef;
  }

  #panelApres {
    justify-content: center;
    clip-path: inset(0 0 0 100%);
    background: #f7f4ef;
    inset: 0;
    padding: 24px;
  }

  #panelApres .photos-row img {
    height: 400px;
    flex: 1;
    width: 0;
    object-fit: cover;
    border-radius: 8px;
  }

  .photos-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .rendus-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #c8622a;
  }

  .label {
    position: absolute;
    top: 34px;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.3s;
  }

  #labelAvant {
    left: 34px;
    background: rgba(26, 22, 18, 0.65);
    color: white;
  }

  #labelApres {
    background: rgba(200, 98, 42, 0.85);
    color: white;
    opacity: 0;
    left: 34px;
  }

  .divider {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: white;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .handle {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 44px;
    height: 44px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .handle svg { width: 20px; height: 20px; }

  .hint {
    margin-top: 16px;
    font-size: 12px;
    color: #b0a99e;
    display: flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>

<p class="section-label">La différence en un geste</p>
<h2>Voyez ce que vos visiteurs voient vraiment</h2>
<p class="subtitle">Glissez pour comparer une annonce classique et une annonce enrichie avec nos plans 3D</p>

<div class="slider-outer" id="sliderOuter">

  <div class="label" id="labelAvant">Avant</div>
  <div class="label" id="labelApres">Après</div>

  <div class="divider" id="divider"></div>
  <div class="handle" id="handle">
    <svg viewBox="0 0 20 20" fill="none">
      <path d="M7 5L3 10L7 15" stroke="#c8622a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M13 5L17 10L13 15" stroke="#c8622a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="panel" id="panelAvant">
    <div class="photos-row">
      <img src="https://nicolasengelbeen.github.io/Formulaire-3D/Annonce1.png" alt="Photo 1">
      <img src="https://nicolasengelbeen.github.io/Formulaire-3D/Annonce2.png" alt="Photo 2">
      <img src="https://nicolasengelbeen.github.io/Formulaire-3D/Annonce3.png" alt="Photo 3">
    </div>
    <div class="rendus-label">+ Nos plans 3D</div>
    <div class="rendus-row">
      <img src="https://nicolasengelbeen.github.io/Formulaire-3D/Rendu1.png" alt="Rendu 3D 1">
      <img src="https://nicolasengelbeen.github.io/Formulaire-3D/Rendu2.png" alt="Rendu 3D 2">
    </div>
  </div>

  <div class="panel" id="panelApres">
    <div class="photos-row">
      <img src="https://nicolasengelbeen.github.io/Formulaire-3D/Annonce1.png" alt="Photo 1">
      <img src="https://nicolasengelbeen.github.io/Formulaire-3D/Annonce2.png" alt="Photo 2">
      <img src="https://nicolasengelbeen.github.io/Formulaire-3D/Annonce3.png" alt="Photo 3">
    </div>
  </div>

</div>

<p class="hint">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2L2 7L5 12M9 2L12 7L9 12" stroke="#b0a99e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Glissez le curseur pour comparer
</p>

<script>
  const outer      = document.getElementById('sliderOuter');
  const panelApres = document.getElementById('panelApres');
  const divider    = document.getElementById('divider');
  const handle     = document.getElementById('handle');
  const labelAvant = document.getElementById('labelAvant');
  const labelApres = document.getElementById('labelApres');

  let pct = 0;
  let dragging = false;
  let animDone = false;

  function setPos(p) {
    p = Math.max(0, Math.min(100, p));
    pct = p;

    const right = 100 - p;
    panelApres.style.clipPath = `inset(0 ${right}% 0 0)`;

    const innerW = outer.clientWidth - 48;
    const px = 24 + (p / 100) * innerW;
    divider.style.left = px + 'px';
    handle.style.left  = px + 'px';
    labelApres.style.left = Math.min(px + 10, outer.clientWidth - 100) + 'px';

    const started = p > 2;
    divider.style.opacity    = started ? '1' : '0';
    handle.style.opacity     = started ? '1' : '0';
    labelApres.style.opacity = started ? '1' : '0';
    labelAvant.style.opacity = p > 90 ? '0' : '1';
  }

  function getP(clientX) {
    const rect = outer.getBoundingClientRect();
    return Math.max(0, Math.min(100, ((clientX - rect.left - 24) / (rect.width - 48)) * 100));
  }

  outer.addEventListener('mousedown', e => { dragging = true; animDone = true; setPos(getP(e.clientX)); });
  window.addEventListener('mousemove', e => { if (dragging) setPos(getP(e.clientX)); });
  window.addEventListener('mouseup', () => { dragging = false; });

  outer.addEventListener('touchstart', e => { dragging = true; animDone = true; setPos(getP(e.touches[0].clientX)); }, { passive: true });
  window.addEventListener('touchmove', e => { if (dragging) setPos(getP(e.touches[0].clientX)); }, { passive: true });
  window.addEventListener('touchend', () => { dragging = false; });

  function autoAnimate() {
    const duration = 2200;
    const start = performance.now();
    function step(now) {
      if (animDone) return;
      const t = Math.min((now - start) / duration, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      setPos(ease * 70);
      if (t < 1) requestAnimationFrame(step);
    }
    setTimeout(() => { if (!animDone) requestAnimationFrame(step); }, 800);
  }

  setPos(0);
  autoAnimate();
  window.addEventListener('resize', () => setPos(pct));
</script>

</body>
</html>
